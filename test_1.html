<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>derivatives with AboEl5yr</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <script src="u1.js"></script>
</head>
<body>
    <h1 id="l1">Unit Test 1: Limits</h1>
    <div class="utestcont">
        <form id="quiz-form" class="quiz-form">
            
            <div class="chartcont">
                <div id="dis"></div>
                <div class="axis-label y-axis">$$f(x)$$</div>
                <div class="axis-label x-axis">$$x$$</div>
            </div>

            <label>According to this graph, what is \(\lim_{x \to 0} f(x)\)?</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q1" value="A" class="mcq" required> A) \(0\)</label>
                <label><input type="radio" name="u1_q1" value="B" class="mcq"> B) \(1\)</label>
                <label><input type="radio" name="u1_q1" value="C" class="mcq"> C) \(2\)</label>
                <label><input type="radio" name="u1_q1" value="D" class="mcq"> D) Does not exist</label>
            </div>

            <label>According to this graph, which statement is true?</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q2" value="A" class="mcq" required> A) \(f(0) = 2\)</label>
                <label><input type="radio" name="u1_q2" value="B" class="mcq"> B) \(f(0) = 0\) and \(\lim_{x \to 0} f(x) = 2\)</label>
                <label><input type="radio" name="u1_q2" value="C" class="mcq"> C) \(f(0) = 2\) and \(\lim_{x \to 0} f(x) = 2\)</label>
                <label><input type="radio" name="u1_q2" value="D" class="mcq"> D) The limit does not exist</label>
            </div>

            <label>\(\lim_{x \to 2} f(x) = 5, \lim_{x \to 2} g(x) = 3\). Find \(\lim_{x \to 2} [2f(x)-g(x)]\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q3" value="A" class="mcq" required> A) \(7\)</label>
                <label><input type="radio" name="u1_q3" value="B" class="mcq"> B) \(8\)</label>
                <label><input type="radio" name="u1_q3" value="C" class="mcq"> C) \(10\)</label>
                <label><input type="radio" name="u1_q3" value="D" class="mcq"> D) \(13\)</label>
            </div>

            <label>Evaluate: \(\lim_{x \to 0} \frac{\sin x}{x}\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q4" value="A" class="mcq" required> A) \(1\)</label>
                <label><input type="radio" name="u1_q4" value="B" class="mcq"> B) \(0\)</label>
                <label><input type="radio" name="u1_q4" value="C" class="mcq"> C) \(\infty\)</label>
                <label><input type="radio" name="u1_q4" value="D" class="mcq"> D) Does not exist</label>
            </div>

            <label>Evaluate: \(\lim_{x \to 3} (2x^2 - 5)\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q5" value="A" class="mcq" required> A) \(7\)</label>
                <label><input type="radio" name="u1_q5" value="B" class="mcq"> B) \(18\)</label>
                <label><input type="radio" name="u1_q5" value="C" class="mcq"> C) \(13\)</label>
                <label><input type="radio" name="u1_q5" value="D" class="mcq"> D) \(10\)</label>
            </div>

            <label>Evaluate: \(\lim_{x \to 4} \frac{x^2-16}{x-4}\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q6" value="A" class="mcq" required> A) \(7\)</label>
                <label><input type="radio" name="u1_q6" value="B" class="mcq"> B) \(8\)</label>
                <label><input type="radio" name="u1_q6" value="C" class="mcq"> C) \(10\)</label>
                <label><input type="radio" name="u1_q6" value="D" class="mcq"> D) \(13\)</label>
            </div>

            <label>Evaluate the infinite limit: \(\lim_{x \to \infty} \frac{5x^2+1}{2x^2-3}\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q7" value="A" class="mcq" required> A) \(\frac{5}{2}\)</label>
                <label><input type="radio" name="u1_q7" value="B" class="mcq"> B) \(0\)</label>
                <label><input type="radio" name="u1_q7" value="C" class="mcq"> C) \(\infty\)</label>
                <label><input type="radio" name="u1_q7" value="D" class="mcq"> D) \(-\frac{1}{3}\)</label>
            </div>

            <label>Evaluate: \(\lim_{x \to 2}\frac{x^2-4}{x-2}\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q8" value="A" class="mcq" required> A) \(2\)</label>
                <label><input type="radio" name="u1_q8" value="B" class="mcq"> B) \(4\)</label>
                <label><input type="radio" name="u1_q8" value="C" class="mcq"> C) \(6\)</label>
                <label><input type="radio" name="u1_q8" value="D" class="mcq"> D) Does not exist</label>
            </div>

            <label>
                Given:
                $$
                f(x)=
                \begin{cases}
                x+3, & x>1,\\
                2x, & x \le 1,
                \end{cases}
                $$
                What is \(\lim_{x\to1}f(x)\)?
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q9" value="A" class="mcq" required> A) \(2\)</label>
                <label><input type="radio" name="u1_q9" value="B" class="mcq"> B) \(3\)</label>
                <label><input type="radio" name="u1_q9" value="C" class="mcq"> C) \(4\)</label>
                <label><input type="radio" name="u1_q9" value="D" class="mcq"> D) Does not exist</label>
            </div>

            <label>Evaluate: \(\lim_{x \to 0}\frac{\sqrt{x+4}-2}{x}\)</label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q10" value="A" class="mcq" required> A) \(\frac{1}{2}\)</label>
                <label><input type="radio" name="u1_q10" value="B" class="mcq"> B) \(\frac{1}{4}\)</label>
                <label><input type="radio" name="u1_q10" value="C" class="mcq"> C) \(1\)</label>
                <label><input type="radio" name="u1_q10" value="D" class="mcq"> D) \(0\)</label>
            </div>

            <button type="submit">Submit</button>

            <div id="result-u" class="result-message"></div>
        </form>
    </div>

    <a href="index.html" class="but"><button>Back</button></a>
</body>
</html>
