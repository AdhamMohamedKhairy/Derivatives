<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>derivatives with AboEl5yr</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
    <script src="u3.js"></script>
</head>
<body>
    <h1 id="l1">Unit Test 3: Differentiation II</h1>
    <div class="utestcont">
        <form id="quiz-form" class="quiz-form">

            <label>
                if
                $$y=(4x-1)^3$$
                the \(\frac{dy}{dx}\) is:
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q1" value="A" class="mcq" required> A) \(3(4x−1)^2\)</label>
                <label><input type="radio" name="u1_q1" value="B" class="mcq"> B) \(2(4x−1)^3\)</label>
                <label><input type="radio" name="u1_q1" value="C" class="mcq"> C) \(4(4x−1)^2\)</label>
                <label><input type="radio" name="u1_q1" value="D" class="mcq"> D) \(12(4x−1)^2\)</label>
            </div>

            <label>
                if
                $$y = \sqrt{5x^2 + 1}$$
                find \(\frac{dy}{dx}\)
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q2" value="A" class="mcq" required> A) \(\frac{5x}{5x^2-1}\)</label>
                <label><input type="radio" name="u1_q2" value="B" class="mcq"> B) \(\frac{10x}{2x^2-1}\)</label>
                <label><input type="radio" name="u1_q2" value="C" class="mcq"> C) \(\frac{x}{5x^2-1+5}\)</label>
                <label><input type="radio" name="u1_q2" value="D" class="mcq"> D) \(\frac{5}{x^2}\)</label>
            </div>

            <label>
                $$y = sin(2x^3+1), \frac{dy}{dx} = ???$$
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q3" value="A" class="mcq" required> A) \(6x^2 cos(2x^3+1) - 72x\)</label>
                <label><input type="radio" name="u1_q3" value="B" class="mcq"> B) \(sin(2x^3+1)\)</label>
                <label><input type="radio" name="u1_q3" value="C" class="mcq"> C) \(cos(6x^2+1)\)</label>
                <label><input type="radio" name="u1_q3" value="D" class="mcq"> D) \(6x^2 cos(2x^3+1)\)</label>
            </div>

            <label>
                differentiate 
                $$e^{(x^2-3x)}$$
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q4" value="A" class="mcq" required> A) \((2x-3)e^{(2x-3)}\)</label>
                <label><input type="radio" name="u1_q4" value="B" class="mcq"> B) \((2x-3)e^{(x^2-3x)}\)</label>
                <label><input type="radio" name="u1_q4" value="C" class="mcq"> C) \((2x-3)e\)</label>
                <label><input type="radio" name="u1_q4" value="D" class="mcq"> D) \((2x-3)e^{(x^2+3x)}\)</label>
            </div>

            <label>
                if the velocity function of a particle is 
                $$f(x)= \ln(3x^2+4x+2)$$
                find the acceleration
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q5" value="A" class="mcq" required> A) \(\frac{(4x^3\cos x-x^4\sin x+e^x)x^2+2x(x^4\cos x+e^x)}{x^4}\)</label>
                <label><input type="radio" name="u1_q5" value="B" class="mcq"> B) \(\frac{6x+4}{3x^2+4x+2} e^{(6x+4)}\)</label>
                <label><input type="radio" name="u1_q5" value="C" class="mcq"> C) \(\frac{6x+4}{\ln(3x^2+4x+2)}\)</label>
                <label><input type="radio" name="u1_q5" value="D" class="mcq"> D) \(\frac{6x+4}{3x^2+4x+2}\)</label>
            </div>

            <label>
                find the jerk (yes that is a real physics concept, google it) of the acceleration relation:
                $$x^2 + y^2 = 49$$
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q6" value="A" class="mcq" required> A) \(-\fracxy\)</label>
                <label><input type="radio" name="u1_q6" value="B" class="mcq"> B) \(-\fracyx\)</label>
                <label><input type="radio" name="u1_q6" value="C" class="mcq"> C) \(\fracxy\)</label>
                <label><input type="radio" name="u1_q6" value="D" class="mcq"> D) \(\fracxy\)</label>
            </div>

            <label>
                if
                $$f(x) = x^2 + xy + y^2 = 12$$
                then \(f'(x) =\)
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q7" value="A" class="mcq" required> A) \(-\frac{x+2y}{2x+y}\)</label>
                <label><input type="radio" name="u1_q7" value="B" class="mcq"> B) \(\frac{x+2y}{2x+y}\)</label>
                <label><input type="radio" name="u1_q7" value="C" class="mcq"> C) \(-\frac{2x+y}{x+2y}\)</label>
                <label><input type="radio" name="u1_q7" value="D" class="mcq"> D) \(\frac{2x+y}{x+2y}\)</label>
            </div>

            <label>
                differentiate
                $$x^2 y + y^3 = 9$$
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q8" value="A" class="mcq" required> A) \(x^2 2^x \left((x+3)\log x + \frac{1}{\ln 10}\right)\)</label>
                <label><input type="radio" name="u1_q8" value="B" class="mcq"> B) \(x^2 2^x \left((x \ln 2+3)\log x + \frac{1}{\ln 10}\right)\)</label>
                <label><input type="radio" name="u1_q8" value="C" class="mcq"> C) \(x^2 2^x \left((x+3)\ln x + \frac{1}{\ln 10}\right)\)\)</label>
                <label><input type="radio" name="u1_q8" value="D" class="mcq"> D) \(x^2 2^x \left((x+3)log x + \frac{1}{\ln 20}\right)\)</label>
            </div>

            <label>good luck with the next 2 problems, u will need it...</label>

            <label>
                find \(\frac{dy}{dx}\) where:
                $$e^{xy} = x+y$$
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q9" value="A" class="mcq" required> A) \(\frac{1-e^{xy}}{1-xe^{xy}}\)</label>
                <label><input type="radio" name="u1_q9" value="B" class="mcq"> B) \(\frac{ye^{x}-1}{1+xe^{y}}\)</label>
                <label><input type="radio" name="u1_q9" value="C" class="mcq"> C) \(\frac{xe^{xy}-1}{ye^{xy}}\)</label>
                <label><input type="radio" name="u1_q9" value="D" class="mcq"> D) \(\frac{ye^{xy}-1}{1-xe^{xy}}\)</label>
            </div>

            <label>
                if:
                $$\sin(xy) +x^2 y = e^y$$
            </label>
            <div class="mcq-options">
                <label><input type="radio" name="u1_q10" value="A" class="mcq large" required> A) \(\frac{e^y - 2xy - y \cos(xy)}{x \cos(xy) + x^2 -e^y}\)</label>
                <label><input type="radio" name="u1_q10" value="B" class="mcq large"> B) \(\frac{e^y - xy - x \cos(xy)}{y \cos(xy) + x^2 -e^y}\)</label>
                <label><input type="radio" name="u1_q10" value="C" class="mcq large"> C) \(\frac{x - 2x - e^y \cos(xy)}{x \cos(xy) + y^2 + e^y}\)</label>
                <label><input type="radio" name="u1_q10" value="D" class="mcq large"> D) \(\frac{e^y - y \cos(y)}{x \cos(x) + x^2 - e^y}\)</label>
            </div>

            <button type="submit">Submit</button>

            <div id="result-u" class="result-message"></div>
        </form>
    </div>

    <a href="index.html" class="but"><button>Back</button></a>
</body>
</html>
